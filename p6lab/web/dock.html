<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>p6lab — Live Signal Dock</title>
  <link rel="stylesheet" href="css/correlation_feed.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #111;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .dock-host {
      max-width: 560px;
      margin: 30px auto;
    }
    .dock-host h1 {
      color: #eee;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0 0 10px;
    }
    .fallback-msg {
      color: #aaa;
      font-size: 12px;
      padding: 12px;
      border: 1px dashed #444;
      border-radius: 3px;
      background: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="dock-host">
    <h1>Live Signal Dock</h1>
    <div id="dock-container">
      <div class="fallback-msg">
        This page mounts <code>CorrelationFeed</code> against a WebSocket
        connection. Configure <code>window.P6LAB_WS_URL</code> before load
        (default: <code>ws://localhost:8000/ws</code>).
      </div>
    </div>
  </div>

  <script src="js/correlation_feed.js"></script>
  <script>
    (function mount() {
      const url = window.P6LAB_WS_URL || 'ws://localhost:8000/ws';
      const container = document.getElementById('dock-container');
      container.innerHTML = '';

      // Minimal WebSocket client matching the .on(channel, cb) shape used by
      // correlation_feed.js. Production code should use the server's real
      // client; this keeps the dock runnable standalone.
      const listeners = { correlation_match: [], open: [], close: [] };
      const ws = new WebSocket(url);
      ws.onopen    = () => listeners.open.forEach(fn => fn());
      ws.onclose   = () => listeners.close.forEach(fn => fn());
      ws.onmessage = (e) => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (!msg || !msg.type) return;
        (listeners[msg.type] || []).forEach(fn => fn(msg.payload || msg));
      };
      const wsClient = {
        on:  (ch, fn) => { (listeners[ch] = listeners[ch] || []).push(fn); },
        off: (ch, fn) => {
          const arr = listeners[ch] || [];
          const i = arr.indexOf(fn);
          if (i >= 0) arr.splice(i, 1);
        },
      };

      new CorrelationFeed({ container, wsClient });
    })();
  </script>
</body>
</html>
